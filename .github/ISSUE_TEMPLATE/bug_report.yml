name: 🐛 Bug Report
description: File a structured report to help us reproduce and resolve code errors.
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Provide a clear and concise description of the bug.
      placeholder: Describe what happens...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide the exact series of commands or actions to trigger the bug.
      placeholder: |
        1. Run '...'
        2. Set slide to '...'
        3. See error '...'
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment Info
      description: Provide OS version, Python version, library versions, and Docker usage status.
      placeholder: |
        - OS: Windows 11
        - Python: 3.10.9
        - Execution: Docker Compose / Local
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity Level
      options:
        - Critical (Crash / App won't launch)
        - Major (Feature block)
        - Minor (UI glitch / documentation typo)
    validations:
      required: true
