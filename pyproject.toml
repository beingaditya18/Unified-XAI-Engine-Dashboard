[tool.black]
line-length = 100
target-version = ['py310']
include = '\.pyi?$'

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "A", "C4"]
ignore = ["E501", "B905", "B904", "C408"]

[tool.ruff.lint.isort]
known-first-party = ["src", "explainability", "dashboard", "models"]

[tool.mypy]
python_version = "3.10"
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true
show_error_codes = true

[[tool.mypy.overrides]]
module = [
    "shap.*",
    "lime.*",
    "streamlit.*",
    "plotly.*",
    "yaml.*",
    "sklearn.*",
    "xgboost.*",
    "matplotlib.*"
]
ignore_missing_imports = true
